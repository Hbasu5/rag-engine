<!DOCTYPE html>
<html>
<head>
<title>RAG Interface</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

#header {
    height: 50px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    background: #020617;
    font-weight: bold;
    font-size: 18px;
    border-bottom: 1px solid #1f2937;
}

#chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.msg {
    max-width: 65%;
    padding: 12px 16px;
    border-radius: 18px;
    line-height: 1.5;
}

.user {
    background: #2563eb;
    align-self: flex-end;
}

.bot {
    background: #1f2937;
    align-self: flex-start;
}

.meta-btn {
    margin-top: 6px;
    font-size: 12px;
    cursor: pointer;
    color: #93c5fd;
}

.sources-box {
    background: #111827;
    margin-top: 8px;
    padding: 10px;
    border-radius: 10px;
    display: none;
}

#inputBox {
    display: flex;
    padding: 10px;
    background: #111827;
    position: relative;
}

#query {
    flex: 1;
    padding: 12px;
    border-radius: 20px;
    background: white;
    color: black;
    outline: none;
}

/* Stable placeholder */
#query.empty:before {
    content: "Type '/' for commands...";
    color: #9ca3af;
}

button {
    margin-left: 10px;
    padding: 10px 16px;
    border-radius: 12px;
}

#slashMenu {
    position: absolute;
    bottom: 60px;
    left: 10px;
    background: #1f2937;
    border-radius: 10px;
    display: none;
}

.slash-item {
    padding: 8px 12px;
    cursor: pointer;
}

.slash-item:hover {
    background: #374151;
}

.token {
    background: #374151;
    color: #e5e7eb;
    padding: 3px 8px;
    border-radius: 8px;
    margin-right: 5px;
    display: inline-block;
    font-size: 13px;
}
</style>
</head>

<body>

<div id="header">
    <span style="color:#60a5fa;">RAG</span> Interface v1.0.2
</div>

<div id="chat"></div>

<div id="inputBox">
    <div id="query" contenteditable="true"></div>
    <button onclick="sendMessage()">Send</button>

    <div id="slashMenu">
        <div class="slash-item" onclick="setMode('LLM')">LLM</div>
        <div class="slash-item" onclick="setMode('Local')">Local</div>
    </div>
</div>

<script>
let mode = "Auto";

const input = document.getElementById("query");
const slashMenu = document.getElementById("slashMenu");

/* ===== Placeholder ===== */
function updatePlaceholder() {
    if (input.innerText.trim() === "") {
        input.classList.add("empty");
    } else {
        input.classList.remove("empty");
    }
}

/* ===== Input handler ===== */
function handleInput() {
    if (input.innerHTML === "<br>") input.innerHTML = "";

    const text = input.innerText.trim();

    if (text === "/") {
        slashMenu.style.display = "block";
    } else {
        slashMenu.style.display = "none";
    }

    updatePlaceholder();
}

input.addEventListener("input", handleInput);

/* ===== Insert token ===== */
function setMode(m) {
    mode = m;

    const token = document.createElement("span");
    token.className = "token";
    token.contentEditable = "false";
    token.innerText = m;

    input.innerHTML = "";
    input.appendChild(token);
    input.appendChild(document.createTextNode(" "));

    placeCursorAtEnd(input);
    slashMenu.style.display = "none";
    updatePlaceholder();
}

/* ===== Cursor ===== */
function placeCursorAtEnd(el) {
    el.focus();
    const range = document.createRange();
    range.selectNodeContents(el);
    range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
}

/* ===== Backspace ===== */
input.addEventListener("keydown", function(e) {
    if (e.key === "Backspace") {
        const sel = window.getSelection();
        const node = sel.anchorNode;

        if (node && node.parentElement && node.parentElement.classList.contains("token")) {
            node.parentElement.remove();
            mode = "Auto";
            e.preventDefault();
            updatePlaceholder();
        }
    }

    if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
    }
});

/* ===== Add message ===== */
function addMessage(text, type, sources=[]) {
    const chat = document.getElementById("chat");

    const msg = document.createElement("div");
    msg.className = "msg " + type;
    msg.innerHTML = formatText(text);

    if (type === "bot" && sources.length > 0) {
        const btn = document.createElement("div");
        btn.className = "meta-btn";
        btn.innerText = "Sources";

        const box = document.createElement("div");
        box.className = "sources-box";
        box.innerText = sources.join("\n");

        btn.onclick = () => {
            showSourcesPopup(Sources)
        };

        msg.appendChild(btn);
        msg.appendChild(box);
    }

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

/* ===== Send ===== */
function sendMessage() {
    let text = input.innerText.trim();
    if (!text) return;

    text = text.replace("LLM", "").replace("Local", "").trim();

    addMessage(text, "user");

    input.innerHTML = "";
    updatePlaceholder();

    const thinking = document.createElement("div");
    thinking.className = "msg bot";
    thinking.innerText = "Thinking...";
    document.getElementById("chat").appendChild(thinking);

    setTimeout(() => {
        thinking.remove();
        generateResponse(text);
    }, 200);
}

/* ==== Sources ==== */
function showSourcesPopup(sources) {
    let popup = document.getElementById("popup");

    if (!popup) {
        popup = document.createElement("div");
        popup.id = "popup";
        popup.style.position = "fixed";
        popup.style.bottom = "80px";
        popup.style.right = "20px";
        popup.style.background = "#111827";
        popup.style.padding = "15px";
        popup.style.borderRadius = "10px";
        popup.style.maxWidth = "300px";
        popup.style.zIndex = "1000";

        document.body.appendChild(popup);
    }

    popup.innerHTML = `
        <b>Sources</b><br><br>
        ${sources.map(s => `<div>• ${s}</div>`).join("")}
        <br><button onclick="this.parentElement.remove()">Close</button>
    `;
}
function formatText(text) {
    return text
        .replace(/\*(.*?)\*/g, "<b>$1</b>")   // *bold*
        .replace(/_(.*?)_/g, "<i>$1</i>");   // _italic_ (optional)
}

/* ===== RAG CALL ===== */
async function generateResponse(query) {
    try {
        console.log("Sending request:", query);

        const res = await fetch("/query", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                query: query,
                use_llm: mode === "LLM"
            })
        });

        console.log("Response status:", res.status);

        const data = await res.json();
        console.log("Response data:", data);

        addMessage(data.answer || "No response", "bot", data.sources || []);

    } catch (err) {
        console.error("FETCH ERROR:", err);
        addMessage("⚠️ ERROR: " + err.message, "bot");
    }
}

/* init */
updatePlaceholder();
</script>

</body>
</html>
