<!DOCTYPE html>
<html>
<head>
<title>RAG Interface</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

#progressContainer {
    width: 100%;
    max-width: 320px;
    height: 14px;
    background: #374151;
    border-radius: 999px;
    overflow: hidden;
    margin: 14px auto 0 auto;
}

#progressBar {
    width: 0%;
    height: 100%;
    background: #2563eb;
    transition: width 0.2s;
}

#progressText {
    margin-top: 10px;
    font-size: 14px;
    color: #93c5fd;
    text-align: center;
}

#header {
    height: 55px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    background: #020617;
    font-weight: bold;
    font-size: 18px;
    border-bottom: 1px solid #1f2937;
}

#chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.msg {
    max-width: 65%;
    padding: 14px 18px;
    border-radius: 18px;
    line-height: 1.6;
    word-wrap: break-word;
}

.user {
    background: #2563eb;
    align-self: flex-end;
}

.bot {
    background: #1f2937;
    align-self: flex-start;
}

.meta-btn {
    margin-top: 8px;
    font-size: 12px;
    cursor: pointer;
    color: #93c5fd;
}

#inputBox {
    display: flex;
    align-items: center;
    padding: 6px 10px;
    background: #111827;
    position: relative;
}

#attachBtn {
    width:30px;
    height: 38px;
    min-width: 42px;
    background: #2563eb;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 26px;
    margin-right: 10px;
    transition: 0.2s;
}

#attachBtn:hover {
    background: #1d4ed8;
}

#query {
    flex: 1;
    padding: 8px 12px;
    border-radius: 18px;
    background: white;
    color: black;
    outline: none;
    min-height: 20px;
}

#query.empty:before {
    content: "Type '/' for commands...";
    color: #9ca3af;
}

button {
    margin-left: 10px;
    padding: 10px 16px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
}

#attachMenu {
    position: fixed;
    bottom: 80px;
    left: 20px;
    background: #1f2937;
    border-radius: 14px;
    overflow: hidden;
    display: none;
    min-width: 220px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    z-index: 1000;
}

.attach-item {
    padding: 14px 18px;
    cursor: pointer;
    transition: 0.2s;
}

.attach-item:hover {
    background: #374151;
}

#slashMenu {
    position: absolute;
    bottom: 65px;
    left: 70px;
    background: #1f2937;
    border-radius: 10px;
    display: none;
    overflow: hidden;
}

.slash-item {
    padding: 10px 14px;
    cursor: pointer;
}

.slash-item:hover {
    background: #374151;
}

.token {
    background: #374151;
    color: #e5e7eb;
    padding: 4px 8px;
    border-radius: 8px;
    margin-right: 5px;
    display: inline-block;
    font-size: 13px;
}

#uploadModal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);

    display: none;

    align-items: center;
    justify-content: center;

    z-index: 9999;
}

#modalContent {
    background: #111827;
    padding: 30px;
    border-radius: 18px;
    width: 380px;
    text-align: center;
    border: 1px solid #374151;
}

#modalMessage {
    font-size: 16px;
    margin-bottom: 20px;
}

#modalContent button {
    background: #2563eb;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 12px;
    margin-left: 0;
}

#modalContent button:hover {
    background: #1d4ed8;
}

#popup {
    position: fixed;
    bottom: 90px;
    right: 20px;
    background: #111827;
    padding: 16px;
    border-radius: 14px;
    max-width: 320px;
    z-index: 1000;
    border: 1px solid #374151;
}

</style>
</head>

<body>

<div id="header">
    <span style="color:#60a5fa;">RAG</span> Interface v1.0.3
</div>

<div id="chat"></div>

<div id="inputBox">

    <div id="attachBtn" onclick="toggleAttachMenu()">
        +
    </div>

    <div id="query" contenteditable="true"></div>

    <button onclick="sendMessage()">Send</button>

    <div id="slashMenu">
        <div class="slash-item" onclick="setMode('LLM')">LLM</div>
        <div class="slash-item" onclick="setMode('Local')">Local</div>
    </div>

</div>

<div id="attachMenu">

    <div class="attach-item" onclick="triggerUpload()">
        📄 Add Document
    </div>

    <div class="attach-item" onclick="triggerAudioUpload()">
        🎤 Add Audio
    </div>

    <div class="attach-item">
        🌐 Web Search
    </div>

</div>

<input type="file" id="fileUpload" hidden>

<div id="uploadModal">

    <div id="modalContent">

        <div id="modalMessage">
            Upload successful
        </div>

        <div id="progressContainer">
            <div id="progressBar"></div>
        </div>

        <div id="progressText">
            0%
        </div>

        <button onclick="closeModal()">
            Close
        </button>

    </div>

</div>

<script>

let mode = "Auto";

const input = document.getElementById("query");
const slashMenu = document.getElementById("slashMenu");
const fileUpload = document.getElementById("fileUpload");

/* ===== Upload ===== */

fileUpload.addEventListener("change", async () => {

    const file = fileUpload.files[0];

    if (!file) return;

    showModal("Uploading...");

    updateProgress(0);

    const formData = new FormData();
    formData.append("file", file);

    const xhr = new XMLHttpRequest();

    xhr.open("POST", "/upload", true);

    xhr.upload.onprogress = function(e) {

        if (e.lengthComputable) {

            const percent = Math.round(
                (e.loaded / e.total) * 100
            );

            updateProgress(percent);
        }
    };

    xhr.onload = function() {

        if (xhr.status === 200) {

            const data = JSON.parse(xhr.responseText);

            if (data.error) {
                showModal("❌ " + data.error);
                return;
            }

            updateProgress(100);

            showModal("✅ " + data.message);

        } else {

            showModal("❌ Upload failed");
        }
    };

    xhr.onerror = function() {

        showModal("❌ Upload failed");
    };

    xhr.send(formData);
});

/* ===== Attachment Menu ===== */

function toggleAttachMenu() {

    const menu = document.getElementById("attachMenu");

    if (menu.style.display === "block") {
        menu.style.display = "none";
    } else {
        menu.style.display = "block";
    }
}

function triggerUpload() {

    const upload = document.getElementById("fileUpload");

    upload.accept = ".txt,.md,.png,.jpg,.jpeg";

    upload.click();

    document.getElementById("attachMenu").style.display = "none";
}

function triggerAudioUpload() {

    const upload = document.getElementById("fileUpload");

    upload.accept = ".mp3,.wav,.m4a";

    upload.click();

    document.getElementById("attachMenu").style.display = "none";
}

/* ===== Modal ===== */

function showModal(message) {

    document.getElementById("modalMessage").innerText = message;

    document.getElementById("uploadModal").style.display = "flex";
}

function closeModal() {

    document.getElementById("uploadModal").style.display = "none";
}

function updateProgress(percent) {

    document.getElementById("progressBar").style.width =
        percent + "%";

    document.getElementById("progressText").innerText =
        percent + "%";
}

/* ===== Close Menu On Outside Click ===== */

document.addEventListener("click", function(e) {

    const menu = document.getElementById("attachMenu");
    const btn = document.getElementById("attachBtn");

    if (!menu.contains(e.target) && !btn.contains(e.target)) {
        menu.style.display = "none";
    }
});

/* ===== Placeholder ===== */

function updatePlaceholder() {

    if (input.innerText.trim() === "") {
        input.classList.add("empty");
    } else {
        input.classList.remove("empty");
    }
}

input.addEventListener("input", handleInput);

/* ===== Input Handler ===== */

function handleInput() {

    if (input.innerHTML === "<br>") {
        input.innerHTML = "";
    }

    const text = input.innerText.trim();

    if (text === "/") {
        slashMenu.style.display = "block";
    } else {
        slashMenu.style.display = "none";
    }

    updatePlaceholder();
}

/* ===== Insert Token ===== */

function setMode(m) {

    mode = m;

    const token = document.createElement("span");

    token.className = "token";
    token.contentEditable = "false";
    token.innerText = m;

    input.innerHTML = "";

    input.appendChild(token);
    input.appendChild(document.createTextNode(" "));

    placeCursorAtEnd(input);

    slashMenu.style.display = "none";

    updatePlaceholder();
}

/* ===== Cursor ===== */

function placeCursorAtEnd(el) {

    el.focus();

    const range = document.createRange();

    range.selectNodeContents(el);
    range.collapse(false);

    const sel = window.getSelection();

    sel.removeAllRanges();
    sel.addRange(range);
}

/* ===== Backspace ===== */

input.addEventListener("keydown", function(e) {

    if (e.key === "Backspace") {

        const sel = window.getSelection();
        const node = sel.anchorNode;

        if (
            node &&
            node.parentElement &&
            node.parentElement.classList.contains("token")
        ) {
            node.parentElement.remove();
            mode = "Auto";

            e.preventDefault();

            updatePlaceholder();
        }
    }

    if (e.key === "Enter") {
        e.preventDefault();
        sendMessage();
    }
});

/* ===== Add Message ===== */

function addMessage(text, type, sources = []) {

    const chat = document.getElementById("chat");

    const msg = document.createElement("div");

    msg.className = "msg " + type;

    msg.innerHTML = formatText(text);

    if (type === "bot" && sources.length > 0) {

        const btn = document.createElement("div");

        btn.className = "meta-btn";
        btn.innerText = "Sources";

        btn.onclick = () => {
            showSourcesPopup(sources);
        };

        msg.appendChild(btn);
    }

    chat.appendChild(msg);

    chat.scrollTop = chat.scrollHeight;
}

/* ===== Send ===== */

function sendMessage() {

    let text = input.innerText.trim();

    if (!text) return;

    text = text.replace("LLM", "")
               .replace("Local", "")
               .trim();

    addMessage(text, "user");

    input.innerHTML = "";

    updatePlaceholder();

    const thinking = document.createElement("div");

    thinking.className = "msg bot";
    thinking.innerText = "Thinking...";

    document.getElementById("chat").appendChild(thinking);

    setTimeout(() => {

        thinking.remove();

        generateResponse(text);

    }, 200);
}

/* ===== Sources Popup ===== */

function showSourcesPopup(sources) {

    let popup = document.getElementById("popup");

    if (!popup) {

        popup = document.createElement("div");

        popup.id = "popup";

        document.body.appendChild(popup);
    }

    popup.innerHTML = `
        <b>Sources</b><br><br>

        ${sources.map(s => `<div>• ${s}</div>`).join("")}

        <br>

        <button onclick="document.getElementById('popup').remove()">
            Close
        </button>
    `;
}

/* ===== Text Formatting ===== */

function formatText(text) {

    return text
        .replace(/\*(.*?)\*/g, "<b>$1</b>")
        .replace(/_(.*?)_/g, "<i>$1</i>");
}

/* ===== Query API ===== */

async function generateResponse(query) {

    try {

        console.log("Sending request:", query);

        const res = await fetch("/query", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                query: query,
                use_llm: mode !== "Local"
            })
        });

        const data = await res.json();

        console.log(data);

        addMessage(
            data.answer || "No response",
            "bot",
            data.sources || []
        );

    } catch (err) {

        console.error(err);

        addMessage(
            "⚠️ ERROR: " + err.message,
            "bot"
        );
    }
}

/* ===== Init ===== */

updatePlaceholder();

</script>

</body>
</html>
